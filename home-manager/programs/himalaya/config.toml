# ================================================================================
# himalaya-tui configuration
#
# Color values accept: named ANSI ("blue"), hex RGB ("#7e9cd8"),
# 256-color index ("33") or "reset". `mod` is a list of:
#   bold, dim, italic, underlined, slow-blink, rapid-blink, reversed,
#   hidden, crossed-out
# ================================================================================

# --------------------------------------------------------------------------------
# Theme — Kanagawa (Wave)
# https://github.com/rebelot/kanagawa.nvim
# --------------------------------------------------------------------------------
[theme]
# Start from the built-in default (named ANSI) and override everything below
# with the Kanagawa palette.
preset = "default"

# Palette reference (Kanagawa Wave):
#   sumiInk0  #16161D   waveBlue1   #223249   springGreen #98BB6C
#   sumiInk3  #1F1F28   waveBlue2   #2D4F67   carpYellow  #E6C384
#   fujiWhite #DCD7BA   crystalBlue #7E9CD8   sakuraPink  #D27E99
#   oldWhite  #C8C093   springBlue  #7FB4CA   autumnRed   #C34043
#   fujiGray  #727169   waveAqua2   #7AA89F   oniViolet   #957FB8

# Top header bar (account name).
[theme.header]
bg = "#2D4F67"
fg = "#DCD7BA"
mod = ["bold"]

# Bottom status bar.
[theme.status-bar]
bg = "#16161D"
fg = "#C8C093"

# Border of the currently-focused panel.
[theme.border-active]
fg = "#7E9CD8"

# Border of inactive panels.
[theme.border-inactive]
fg = "#727169"

# Border of modal dialogs.
[theme.dialog-border]
fg = "#E6C384"

# Selected row / dialog item ("cursor").
[theme.cursor]
bg = "#2D4F67"
fg = "#DCD7BA"
mod = ["bold"]

# Marker on the currently-open mailbox.
[theme.mailbox-current]
fg = "#E6C384"
mod = ["bold"]

# Envelope table column header row.
[theme.envelope-header]
fg = "#7E9CD8"
mod = ["bold"]

# Read messages.
[theme.envelope-seen]
fg = "#727169"

# Unread messages.
[theme.envelope-unread]
fg = "#DCD7BA"
mod = ["bold"]

# Message reader body text.
[theme.message-body]
fg = "#DCD7BA"

# Composer body text.
[theme.compose-text]
fg = "#DCD7BA"

# Composer cursor cell.
[theme.compose-cursor]
bg = "#7E9CD8"
fg = "#16161D"

# Composer visual-mode selection.
[theme.compose-selection]
bg = "#223249"
fg = "#DCD7BA"

# --------------------------------------------------------------------------------
# Account
# --------------------------------------------------------------------------------
#
# Accounts and credentials are intentionally NOT defined here — this file is
# symlinked from the nix-config repo and committed to git.
#
# Per-machine account config lives in (and is deep-merged on top of this file):
#
#   ~/.config/himalaya/account.toml
#
# That path is outside the repo and is never committed. The HIMALAYA_CONFIG
# environment variable (set by the himalaya home-manager module) points at
# both files: "<this file>:<account.toml>".
#
# See account.toml.example in this directory for a Gmail template to copy.
